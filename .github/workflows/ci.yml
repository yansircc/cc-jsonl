name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        working-directory: backend
        run: go test ./api/... ./index/... ./search/... -v -count=1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Copy frontend to embed dir
        run: |
          rm -rf backend/ui/dist
          cp -r frontend/build backend/ui/dist

      - name: Build binary
        working-directory: backend
        run: go build -o ../cc-jsonl .

      - name: Verify binary
        run: ./cc-jsonl --help || true
